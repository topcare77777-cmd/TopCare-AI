<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for Google Logo -->
    <linearGradient id="googleGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="googleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#googleShadow)" />

  <!-- Official Google 'G' Lettermark Vector (Grayscale Edition) -->
  <g transform="translate(106, 106) scale(12.5)" fill="url(#googleGrayGrad)">
    <path d="M15 15v-6h11.24c.48 1.15.76 2.45.76 4.02 0 4.14-2.84 9.98-8 9.98-4.69 0-8.5-3.81-8.5-8.5s3.81-8.5 8.5-8.5c2.31 0 4.29.85 5.8 2.23l4.51-4.51C23.36 1.88 19.45 0 15 0 6.72 0 0 6.72 0 15s6.72 15 15 15c8.28 0 14.5-6.22 14.5-14.5 0-.98-.1-1.92-.26-2.84H15z" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Google Brand Color Gradients -->
    <linearGradient id="googleRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA4335" />
      <stop offset="100%" stop-color="#C5221F" />
    </linearGradient>

    <linearGradient id="googleYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBC05" />
      <stop offset="100%" stop-color="#F29900" />
    </linearGradient>

    <linearGradient id="googleGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34A853" />
      <stop offset="100%" stop-color="#1E8E3E" />
    </linearGradient>

    <linearGradient id="googleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="100%" stop-color="#1A73E8" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="googleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Clean White Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#FFFFFF" filter="url(#googleShadow)" />


    <path d="M15 15v-6h11.24c.48 1.15.76 2.45.76 4.02 0 4.14-2.84 9.98-8 9.98-4.69 0-8.5-3.81-8.5-8.5s3.81-8.5 8.5-8.5c2.31 0 4.29.85 5.8 2.23l4.51-4.51C23.36 1.88 19.45 0 15 0 6.72 0 0 6.72 0 15s6.72 15 15 15c8.28 0 14.5-6.22 14.5-14.5 0-.98-.1-1.92-.26-2.84H15z" fill="url(#googleBlue)" />

    <!-- Green Bottom-Right Extension -->
    <path d="M29.5 15.5c0-.98-.1-1.92-.26-2.84H15v6h8.24c-.66 3.09-3.24 5-6.24 5-3.87 0-7-3.13-7-7s3.13-7 7-7c1.76 0 3.37.66 4.61 1.74l4.24-4.24C23.63 4.19 19.57 2.5 15 2.5 7.82 2.5 2 8.32 2 15.5s5.82 13 13 13c7.18 0 13-5.82 13-13h-.5z" fill="url(#googleGreen)" opacity="0" />


    <!-- Yellow Bottom-Left Segment -->
    <path d="M15 26.5c-3 0-5.58-1.91-6.24-5H2.52C5.03 26.5 9.58 29.5 15 29.5c4.45 0 8.36-1.88 11.24-4.93l-4.24-4.24c-1.24 1.08-2.85 1.74-4.61 1.74z" fill="url(#googleYellow)" />

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Grayscale Square Gradients for Microsoft 4-Pane Logo -->
    <linearGradient id="msGray1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <linearGradient id="msGray2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <linearGradient id="msGray3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <linearGradient id="msGray4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="msShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy/Charcoal Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#msShadow)" />

  <!-- Official Microsoft 4-Pane Window Logo Vector (Grayscale Edition) -->
  <g transform="translate(144, 144) scale(14)">
    <!-- Top-Left Square (Light Gray) -->
    <rect x="0" y="0" width="10.5" height="10.5" rx="1" fill="url(#msGray1)" />
    
    <!-- Top-Right Square (Medium Light Gray) -->
    <rect x="12.5" y="0" width="10.5" height="10.5" rx="1" fill="url(#msGray2)" />
    
    <!-- Bottom-Left Square (Medium Dark Gray) -->
    <rect x="0" y="12.5" width="10.5" height="10.5" rx="1" fill="url(#msGray3)" />
    
    <!-- Bottom-Right Square (Dark Gray) -->
    <rect x="12.5" y="12.5" width="10.5" height="10.5" rx="1" fill="url(#msGray4)" />
  </g>
</svg>

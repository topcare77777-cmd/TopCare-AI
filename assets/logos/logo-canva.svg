<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for Canva Logo -->
    <linearGradient id="canvaGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="canvaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#canvaShadow)" />

  <!-- Official Canva Interlocking 'C' Lettermark Vector (Grayscale Edition) -->
  <g transform="translate(136, 136) scale(12)" fill="none" stroke="url(#canvaGrayGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4 C6.5 4 2 8.5 2 14 C2 19.5 6.5 24 12 24 C17.5 24 22 19.5 22 14 C22 13 21.8 12 21.5 11" />
    <path d="M10 9 C11.5 8 13.5 7.5 15.5 8.5 C18 9.5 19 12 18 15 C17 17.5 14 19 11.5 17.5 C9.5 16 9 13.5 10.5 11.5 C11 11 12 10.5 13 11" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Blue to Cyan SaaS Gradient -->
    <linearGradient id="saasBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <!-- Bright White & Cyan Highlight Gradient -->
    <linearGradient id="saasHighlightGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Futuristic Atmospheric Glow -->
    <filter id="futuristicGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Backlight Glow -->
  <circle cx="256" cy="256" r="150" fill="#3B82F6" opacity="0.25" filter="url(#futuristicGlow)" />

  <!-- Centered Futuristic Geometric Brain & Neural Network Vector -->
  <g transform="translate(128, 128) scale(8)">
    <!-- Outer Digital Circuit Nodes & Traces -->
    <path d="M16 4V28" stroke="url(#saasBlueGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <path d="M4 16H28" stroke="url(#saasBlueGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <path d="M7 7L25 25" stroke="url(#saasBlueGrad)" stroke-width="1" stroke-linecap="round" opacity="0.3" />
    <path d="M25 7L7 25" stroke="url(#saasBlueGrad)" stroke-width="1" stroke-linecap="round" opacity="0.3" />

    <!-- Left Geometric Brain Hemisphere -->
    <path d="M13 7C9.5 7 7 9.5 7 13C7 15.2 8.2 17.1 10 18.2C8.2 19.3 7 21.2 7 23.5C7 27 9.5 29.5 13 29.5C14.8 29.5 16.4 28.8 17.5 27.6" stroke="url(#saasBlueGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Right Geometric Brain Hemisphere (Symmetric) -->
    <path d="M19 7C22.5 7 25 9.5 25 13C25 15.2 23.8 17.1 22 18.2C23.8 19.3 25 21.2 25 23.5C25 27 22.5 29.5 19 29.5C17.2 29.5 15.6 28.8 14.5 27.6" stroke="url(#saasBlueGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Interconnected Abstract Neural Network Nodes & White Highlights -->
    <circle cx="16" cy="16" r="4.5" fill="url(#saasHighlightGrad)" />
    <circle cx="16" cy="16" r="2" fill="#FFFFFF" />

    <!-- Peripheral Circuit Connection Points -->
    <circle cx="7" cy="13" r="1.5" fill="#60A5FA" />
    <circle cx="7" cy="23.5" r="1.5" fill="#60A5FA" />
    <circle cx="25" cy="13" r="1.5" fill="#60A5FA" />
    <circle cx="25" cy="23.5" r="1.5" fill="#60A5FA" />
    <circle cx="16" cy="7" r="1.5" fill="#38BDF8" />
    <circle cx="16" cy="29.5" r="1.5" fill="#38BDF8" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for NVIDIA Eye Symbol -->
    <linearGradient id="nvidiaGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="nvidiaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#nvidiaShadow)" />

  <!-- Official NVIDIA Eye/Chip Symbol Vector (Grayscale Edition) -->
  <g transform="translate(136, 136) scale(12)" fill="url(#nvidiaGrayGrad)">
    <!-- Eye Pupil / Core Node -->
    <circle cx="12" cy="12" r="3.5" />
    
    <!-- Organic Organic Curved Leaf/Eye Outer Contour -->
    <path d="M12 2C6.5 2 2 6.5 2 12c0 2.2.7 4.2 1.9 5.8L2.2 19c-.4.5-.1 1.2.6 1.2h3.4C8 21.3 9.9 22 12 22c5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for OpenAI Logo -->
    <linearGradient id="openaiGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="openaiShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy/Charcoal Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#openaiShadow)" />

  <!-- Official OpenAI Geometric Spiral Icon Vector (Grayscale Edition) -->
  <g transform="translate(116, 116) scale(11.5)" fill="none" stroke="url(#openaiGrayGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- OpenAI Petal 1 (Top) -->
    <path d="M14 2.5C11.5 2.5 9 3.5 7 5.5C5 7.5 4 10 4 12.5V17C4 19.5 5 22 7 24C9 26 11.5 27 14 27V2.5Z" />
    <!-- OpenAI Petal 2 (Top-Right) -->
    <path d="M21.5 7C22.7 9 23.3 11.5 23.3 14C23.3 16.5 22.7 19 21.5 21C20.3 23 18.5 24.5 16.5 25.5L12.5 18.5L16.5 11.5C18.5 12.5 20.3 14 21.5 16Z" />
    <!-- OpenAI Petal 3 (Bottom-Right) -->
    <path d="M14 25.5C16.5 25.5 19 24.5 21 22.5C23 20.5 24 18 24 15.5H14V25.5Z" />
    <!-- OpenAI Petal 4 (Bottom-Left) -->
    <path d="M6.5 21C5.3 19 4.7 16.5 4.7 14C4.7 11.5 5.3 9 6.5 7C7.7 5 9.5 3.5 11.5 2.5L15.5 9.5L11.5 16.5C9.5 15.5 7.7 14 6.5 12Z" />
    <!-- OpenAI Petal 5 (Center Core Detail) -->
    <circle cx="14" cy="14" r="3.5" fill="url(#openaiGrayGrad)" stroke="none" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for Meta Infinity Loop -->
    <linearGradient id="metaGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="metaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#metaShadow)" />


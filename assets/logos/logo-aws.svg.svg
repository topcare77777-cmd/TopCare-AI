<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Grayscale Monochrome Gradient for AWS Logo -->
    <linearGradient id="awsGrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Clean Modern Drop Shadow -->
    <filter id="awsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Clean Dark Navy Circular Badge Background for Optimal Contrast -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#awsShadow)" />

  <!-- Official Amazon Web Services (AWS) Logo & Smile Vector (Grayscale Edition) -->
  <g transform="translate(106, 156) scale(12)" fill="url(#awsGrayGrad)">
    <!-- AWS Letters Typography (Stylized) -->
    <!-- A -->
    <path d="M1.5 16L5 7L8.5 16H6.8L6 13.8H4L3.2 16H1.5ZM4.8 12.5H5.2L5 10.5L4.8 12.5Z" />
    <!-- W -->
    <path d="M10.2 7L12 14.5L13.8 10H14.2L16 14.5L17.8 7H19.5L16.8 16H15.2L13.5 11.2L11.8 16H10.2L7.5 7H10.2Z" />
    <!-- S -->
    <path d="M21 15C20.5 14.8 20.2 14.3 20.2 13.7C20.2 12.8 20.8 12.3 22 12C23.2 11.7 24 11.2 24 10C24 8.8 23 8 21.2 8C19.8 8 19 8.8 18.8 9.5L20.2 10.2C20.4 9.7 20.7 9.3 21.3 9.3C22 9.3 22.5 9.7 22.5 10.2C22.5 10.8 22 11.2 20.8 11.5C19.2 11.9 18.5 12.6 18.5 13.7C18.5 14.9 19.5 15.8 21.5 15.8C23 15.8 23.8 15.2 24.2 14.5L22.8 13.8C22.5 14.3 21.8 15 21 15Z" />

    <!-- Iconic Smile Arrow from A to Z -->
    <path d="M2 19.5 C8 24.5 17 24.5 24 19.5 C24.5 19.1 25.2 19.8 24.6 20.3 C17 25.8 7.5 25.8 1.4 20.3 C0.9 19.8 1.5 19.1 2 19.5 Z" />
    <!-- Arrowhead Tip -->
    <path d="M23 17.5 L26 20.5 L22 22.5 Z" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon Blue to Cyan Lightning Gradient -->
    <linearGradient id="neonLightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="40%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>

    <!-- Intense Bright Core Highlight -->
    <linearGradient id="lightningCore" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Heavy Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur1" />
      <feGaussianBlur stdDeviation="32" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Ambient Backlight Aura -->
    <filter id="neonAmbient" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Ambient Electric Blue Aura Behind Lightning -->
  <circle cx="256" cy="256" r="160" fill="#2563EB" opacity="0.25" filter="url(#neonAmbient)" />

  <!-- Neon Lightning Bolt Icon (AI Speed & Performance) -->
  <g transform="translate(112, 64) scale(9)" filter="url(#neonGlow)">
    
    <!-- Outer Electric Glow Path -->
    <polygon points="18,2 4,20 16,20 12,38 28,16 16,16" 
             fill="none" stroke="url(#neonLightningGrad)" stroke-width="3" stroke-linejoin="round" opacity="0.6" />

    <!-- Main Neon Lightning Bolt Body -->
    <polygon points="18,2 4,20 16,20 12,38 28,16 16,16" 
             fill="url(#neonLightningGrad)" stroke="url(#lightningCore)" stroke-width="1" stroke-linejoin="round" />

    <!-- Central High-Voltage Core Line -->
    <polyline points="17,5 7,19 15,19 12,33 24,15 16,15" 
              fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Modern Enterprise Blue Outer Ring Gradient -->
    <linearGradient id="targetBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Colorful Personality Core Gradients (Representing diverse traits / multi-dimensional psychology) -->
    <linearGradient id="traitCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <linearGradient id="traitPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <linearGradient id="traitPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <linearGradient id="traitAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Glowing Atmosphere Filter -->
    <filter id="targetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Soft Ambient Backlight Glow -->
    <filter id="targetAmbient" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Multi-Color Personality Aura Behind Target -->
  <circle cx="256" cy="256" r="160" fill="#3B82F6" opacity="0.18" filter="url(#targetAmbient)" />
  <circle cx="220" cy="220" r="100" fill="#EC4899" opacity="0.1" filter="url(#targetAmbient)" />
  <circle cx="290" cy="290" r="100" fill="#8B5CF6" opacity="0.1" filter="url(#targetAmbient)" />

  <!-- Modern Flat Personality Test Target Icon -->
  <g transform="translate(64, 64) scale(12)" filter="url(#targetGlow)">
    
    <!-- Outer Target Ring -->
    <circle cx="16" cy="16" r="13" fill="none" stroke="url(#targetBlueGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4" />
    
    <!-- Secondary Target Ring -->
    <circle cx="16" cy="16" r="9.5" fill="none" stroke="url(#targetBlueGrad)" stroke-width="2.2" />

    <!-- Crosshair Ticks / Compass Markers -->
    <line x1="16" y1="1" x2="16" y2="5" stroke="url(#targetBlueGrad)" stroke-width="2" stroke-linecap="round" />
    <line x1="16" y1="27" x2="16" y2="31" stroke="url(#targetBlueGrad)" stroke-width="2" stroke-linecap="round" />
    <line x1="1" y1="16" x2="5" y2="16" stroke="url(#targetBlueGrad)" stroke-width="2" stroke-linecap="round" />
    <line x1="27" y1="16" x2="31" y2="16" stroke="url(#targetBlueGrad)" stroke-width="2" stroke-linecap="round" />

    <!-- Colorful Segmented Personality Core (Four Psychological Quads/Traits) -->
    <g transform="translate(16, 16)">
      <!-- Top-Left Segment (Cyan) -->
      <path d="M 0 0 L -6 0 A 6 6 0 0 1 0 -6 Z" fill="url(#traitCyan)" />
      
      <!-- Top-Right Segment (Purple) -->
      <path d="M 0 0 L 0 -6 A 6 6 0 0 1 6 0 Z" fill="url(#traitPurple)" />
      
      <!-- Bottom-Right Segment (Pink) -->
      <path d="M 0 0 L 6 0 A 6 6 0 0 1 0 6 Z" fill="url(#traitPink)" />
      
      <!-- Bottom-Left Segment (Amber) -->
      <path d="M 0 0 L 0 6 A 6 6 0 0 1 -6 0 Z" fill="url(#traitAmber)" />
    </g>

    <!-- Center Bullseye Core (White & Cyan Spark) -->
    <circle cx="16" cy="16" r="2" fill="#FFFFFF" />
    <circle cx="16" cy="16" r="0.8" fill="#1D4ED8" />

  </g>
</svg>

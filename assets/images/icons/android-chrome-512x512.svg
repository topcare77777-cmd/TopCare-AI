  <circle cx="362" cy="422" r="11" fill="#FFFFFF" opacity="0.95" />
  <circle cx="150" cy="422" r="9" fill="#FFFFFF" opacity="0.85" />
  <circle cx="256" cy="360" r="8" fill="#FFFFFF" opacity="0.9" />
</svg>

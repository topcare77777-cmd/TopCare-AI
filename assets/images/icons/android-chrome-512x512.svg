<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="masterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <filter id="masterGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1D4ED8" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Master Rounded Square Icon Base -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#masterGrad)" filter="url(#masterGlow)" />
  
  <!-- Centered Bold White 'TC' -->
  <text x="256" y="328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="210" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-8">TC</text>
  
  <!-- Elegant Sparkle at Top-Right Corner -->
  <path d="M400 112 L406.5 136.5 L431 143 L406.5 149.5 L400 174 L393.5 149.5 L369 143 L393.5 136.5 Z" fill="#FFFFFF" />
  
  <!-- Elegant AI Circuit Traces Rising from Bottom Edge -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <defs>
    <!-- AI Brain & Circuit Gradient (White to Cyan/Blue) -->
    <linearGradient id="tileAiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#93C5FD" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Subtle Drop Shadow for Windows Start Menu Tile -->
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Solid Deep Blue Windows Start Menu Tile Background -->
  <rect width="150" height="150" fill="#0A192F" />

  <!-- Centered AI Brain & Neural Network Vector (Scaled & Positioned for 150x150 Tile) -->
  <g transform="translate(35, 35) scale(2.5)" filter="url(#tileShadow)">
    <!-- Circuit Connections / Traces -->
    <path d="M16 8V24 M8 16H24" stroke="url(#tileAiGrad)" stroke-width="2" stroke-linecap="round" opacity="0.85" />
    
    <!-- Left Hemisphere -->
    <path d="M10 6C7 6 5 7.8 5 10.5C5 12.2 6 13.6 7.5 14.5C6 15.4 5 16.8 5 18.5C5 21.2 7 23 10 23C11.5 23 12.8 22.3 13.8 21.2" stroke="url(#tileAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Right Hemisphere -->
    <path d="M22 6C25 6 27 7.8 27 10.5C27 12.2 26 13.6 24.5 14.5C26 15.4 27 16.8 27 18.5C27 21.2 25 23 22 23C20.5 23 19.2 22.3 18.2 21.2" stroke="url(#tileAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Central Neural Core Nodes -->
    <circle cx="16" cy="16" r="3.5" fill="#38BDF8" />
    <circle cx="16" cy="16" r="1.5" fill="#FFFFFF" />
    
    <!-- Outer Circuit Nodes -->
    <circle cx="9" cy="10" r="1.5" fill="#93C5FD" />
    <circle cx="23" cy="10" r="1.5" fill="#93C5FD" />
    <circle cx="9" cy="22" r="1.5" fill="#93C5FD" />
    <circle cx="23" cy="22" r="1.5" fill="#93C5FD" />
  </g>
</svg>

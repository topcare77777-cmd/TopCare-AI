<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep Premium Dark Blue PWA Background Gradient -->
    <linearGradient id="pwaBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#08111F" />
    </linearGradient>

    <!-- Glassmorphic Card Surface Gradient -->
    <linearGradient id="pwaGlassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 0.8)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 0.9)" />
    </linearGradient>

    <!-- Modern AI Brain & Circuit Gradient -->
    <linearGradient id="pwaAiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Subtle Cyan/Blue Glow Behind Brain -->
    <filter id="pwaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="32" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Android Launcher / PWA Soft Drop Shadow -->
    <filter id="pwaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- 512x512 Canvas Base -->
  <rect width="512" height="512" rx="112" fill="url(#pwaBgGrad)" />

  <!-- Glassmorphic Container with Subtle Glow & Shadow -->
  <g filter="url(#pwaShadow)">
    <rect x="56" y="56" width="400" height="400" rx="96" fill="url(#pwaGlassGrad)" stroke="rgba(56, 189, 248, 0.3)" stroke-width="3" />
    <!-- Inner Glass Highlight Line -->
    <rect x="59" y="59" width="394" height="394" rx="93" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
  </g>

  <!-- Soft Blue Glow Under Center Icon -->
  <circle cx="256" cy="256" r="130" fill="#2563EB" opacity="0.32" filter="url(#pwaGlow)" />

  <!-- Large Stylized AI Brain & Neural Network Vector (Centered & Scaled) -->
  <g transform="translate(128, 128) scale(8)">
    <!-- Circuit Connections / Traces -->
    <path d="M16 8V24 M8 16H24" stroke="url(#pwaAiGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    
    <!-- Left Hemisphere -->
    <path d="M10 6C7 6 5 7.8 5 10.5C5 12.2 6 13.6 7.5 14.5C6 15.4 5 16.8 5 18.5C5 21.2 7 23 10 23C11.5 23 12.8 22.3 13.8 21.2" stroke="url(#pwaAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Right Hemisphere -->
    <path d="M22 6C25 6 27 7.8 27 10.5C27 12.2 26 13.6 24.5 14.5C26 15.4 27 16.8 27 18.5C27 21.2 25 23 22 23C20.5 23 19.2 22.3 18.2 21.2" stroke="url(#pwaAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Central Neural Core Nodes -->
    <circle cx="16" cy="16" r="3.5" fill="#38BDF8" />
    <circle cx="16" cy="16" r="1.5" fill="#FFFFFF" />
    
    <!-- Outer Circuit Nodes -->
    <circle cx="9" cy="10" r="1.5" fill="#60A5FA" />
    <circle cx="23" cy="10" r="1.5" fill="#60A5FA" />
    <circle cx="9" cy="22" r="1.5" fill="#60A5FA" />
    <circle cx="23" cy="22" r="1.5" fill="#60A5FA" />
  </g>
</svg>

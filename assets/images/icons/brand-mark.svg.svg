<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Enterprise Blue Gradient -->
    <linearGradient id="aiSymbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Bright Core Highlight Gradient -->
    <linearGradient id="aiCoreGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Futuristic Atmospheric Ambient Glow -->
    <filter id="symbolGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="32" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Soft Ambient Glow Behind Symbol -->
  <circle cx="256" cy="256" r="160" fill="#2563EB" opacity="0.22" filter="url(#symbolGlow)" />

  <!-- Abstract Geometric Neural Brain Symbol (Standalone Icon) -->
  <g transform="translate(102.4, 102.4) scale(9.6)">
    <!-- Interconnected Geometric Circuit Network Lines -->
    <path d="M16 3V29" stroke="url(#aiSymbolGrad)" stroke-width="1.25" stroke-linecap="round" opacity="0.45" />
    <path d="M3 16H29" stroke="url(#aiSymbolGrad)" stroke-width="1.25" stroke-linecap="round" opacity="0.45" />
    <path d="M6 6L26 26" stroke="url(#aiSymbolGrad)" stroke-width="1" stroke-linecap="round" opacity="0.3" />
    <path d="M26 6L6 26" stroke="url(#aiSymbolGrad)" stroke-width="1" stroke-linecap="round" opacity="0.3" />

    <!-- Left Geometric Brain Hemisphere -->
    <path d="M13 6C9 6 6 9 6 13C6 15.5 7.5 17.6 9.8 18.8C7.5 20 6 22.1 6 24.6C6 28.6 9 31.6 13 31.6C15.2 31.6 17.2 30.7 18.6 29.2" stroke="url(#aiSymbolGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Right Geometric Brain Hemisphere (Symmetric) -->
    <path d="M19 6C23 6 26 9 26 13C26 15.5 24.5 17.6 22.2 18.8C24.5 20 26 22.1 26 24.6C26 28.6 23 31.6 19 31.6C16.8 31.6 14.8 30.7 13.4 29.2" stroke="url(#aiSymbolGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Central Neural Core / Intelligence Hub -->
    <circle cx="16" cy="16" r="4.5" fill="url(#aiCoreGrad)" />
    <circle cx="16" cy="16" r="1.75" fill="#FFFFFF" />

    <!-- Outer Neural Node Connection Points -->
    <circle cx="6" cy="13" r="1.5" fill="#38BDF8" />
    <circle cx="6" cy="24.6" r="1.5" fill="#38BDF8" />
    <circle cx="26" cy="13" r="1.5" fill="#38BDF8" />
    <circle cx="26" cy="24.6" r="1.5" fill="#38BDF8" />
    <circle cx="16" cy="6" r="1.5" fill="#60A5FA" />
    <circle cx="16" cy="31.6" r="1.5" fill="#60A5FA" />
  </g>
</svg>

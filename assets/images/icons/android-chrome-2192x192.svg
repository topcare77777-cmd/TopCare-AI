<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Dark Navy Android Launcher Background Gradient -->
    <linearGradient id="androidBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#08111F" />
    </linearGradient>

    <!-- AI Brain & Circuit Gradient -->
    <linearGradient id="androidAiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Material Design Soft Elevation Shadow -->
    <filter id="materialShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Android Adaptive Rounded Square Base with Soft Shadow -->
  <rect x="16" y="16" width="160" height="160" rx="38" fill="url(#androidBgGrad)" filter="url(#materialShadow)" stroke="rgba(56, 189, 248, 0.2)" stroke-width="2" />

  <!-- Centered AI Brain Vector Icon (Scaled to fit 192x192 canvas with perfect launcher padding) -->
  <g transform="translate(48, 48) scale(3)">
    <!-- Circuit Connections / Traces -->
    <path d="M16 8V24 M8 16H24" stroke="url(#androidAiGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    
    <!-- Left Hemisphere -->
    <path d="M10 6C7 6 5 7.8 5 10.5C5 12.2 6 13.6 7.5 14.5C6 15.4 5 16.8 5 18.5C5 21.2 7 23 10 23C11.5 23 12.8 22.3 13.8 21.2" stroke="url(#androidAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Right Hemisphere -->
    <path d="M22 6C25 6 27 7.8 27 10.5C27 12.2 26 13.6 24.5 14.5C26 15.4 27 16.8 27 18.5C27 21.2 25 23 22 23C20.5 23 19.2 22.3 18.2 21.2" stroke="url(#androidAiGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Central Neural Core Nodes -->
    <circle cx="16" cy="16" r="3.5" fill="#38BDF8" />
    <circle cx="16" cy="16" r="1.5" fill="#FFFFFF" />
    
    <!-- Outer Circuit Nodes -->
    <circle cx="9" cy="10" r="1.5" fill="#60A5FA" />
    <circle cx="23" cy="10" r="1.5" fill="#60A5FA" />
    <circle cx="9" cy="22" r="1.5" fill="#60A5FA" />
    <circle cx="23" cy="22" r="1.5" fill="#60A5FA" />
  </g>
</svg>

  <path d="M22 10C24.5 10 26 11.5 26 14C26 15.5 25.2 16.8 24 17.5C25.2 18.2 26 19.5 26 21C26 23.5 24.5 25 22 25C20.8 25 19.8 24.5 19 23.5" stroke="url(#aiBrainGrad)" stroke-width="2" stroke-linecap="round" fill="none" />


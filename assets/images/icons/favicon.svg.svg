  <!-- Minimal AI Brain Icon (Vector) -->
  <!-- Left Hemisphere -->
  <path d="M10 10C7.5 10 6 11.5 6 14C6 15.5 6.8 16.8 8 17.5C6.8 18.2 6 19.5 6 21C6 23.5 7.5 25 10 25C11.2 25 12.2 24.5 13 23.5" stroke="url(#aiBrainGrad)" stroke-width="2" stroke-linecap="round" fill="none" />
  

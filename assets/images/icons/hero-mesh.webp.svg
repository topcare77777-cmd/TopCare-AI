<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Base Dark Navy Canvas Gradient -->
    <linearGradient id="meshBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111F" />
      <stop offset="50%" stop-color="#050B14" />
      <stop offset="100%" stop-color="#03060C" />
    </linearGradient>

    <!-- Mesh Gradient Orb 1 (Deep Royal Blue - Top Left) -->
    <radialGradient id="meshOrb1" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#1E40AF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#08111F" stop-opacity="0" />
    </radialGradient>

    <!-- Mesh Gradient Orb 2 (Vibrant Azure / Cyan - Center Right) -->
    <radialGradient id="meshOrb2" cx="80%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#08111F" stop-opacity="0" />
    </radialGradient>

    <!-- Mesh Gradient Orb 3 (Teal / Cyan Highlight - Bottom Center) -->
    <radialGradient id="meshOrb3" cx="45%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.35" />
      <stop offset="45%" stop-color="#3B82F6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#08111F" stop-opacity="0" />
    </radialGradient>

    <!-- Mesh Gradient Orb 4 (Electric Blue Accent - Top Right) -->
    <radialGradient id="meshOrb4" cx="75%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#1D4ED8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#08111F" stop-opacity="0" />
    </radialGradient>

    <!-- Ultra Soft Mesh Blending Filter -->
    <filter id="meshBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="140" />
    </filter>

    <!-- Subtle Grain / Noise Overlay for Enterprise SaaS Depth (Optional Crisp Detail) -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>

  <!-- Deep Navy Base -->
  <rect width="1920" height="1080" fill="url(#meshBase)" />

  <!-- Abstract Mesh Gradient Flow Orbs (Blended with Heavy Blur) -->
  <g filter="url(#meshBlur)">
    <rect width="1920" height="1080" fill="url(#meshOrb1)" />
    <rect width="1920" height="1080" fill="url(#meshOrb2)" />
    <rect width="1920" height="1080" fill="url(#meshOrb3)" />
    <rect width="1920" height="1080" fill="url(#meshOrb4)" />
  </g>

  <!-- Secondary Soft Lighting Highlight Sweep for Center Focus -->
  <circle cx="960" cy="400" r="450" fill="#60A5FA" opacity="0.12" filter="url(#subtleGlow)" />
  <circle cx="960" cy="540" r="250" fill="#38BDF8" opacity="0.08" filter="url(#subtleGlow)" />

  <!-- Clean Enterprise Vignette Edge Frame -->
  <radialGradient id="saasVignette" cx="50%" cy="50%" r="75%">
    <stop offset="50%" stop-color="#000000" stop-opacity="0" />
    <stop offset="100%" stop-color="#03060C" stop-opacity="0.65" />
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#saasVignette)" pointer-events="none" />
</svg>

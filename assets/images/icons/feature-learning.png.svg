<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Enterprise Blue to Cyan Gradient -->
    <linearGradient id="bulbBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Bright Core Highlight Gradient -->
    <linearGradient id="bulbHighlight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Soft Ambient Glow Filter -->
    <filter id="bulbAmbientGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="bulbGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Blue Lighting Aura Behind Bulb -->
  <circle cx="256" cy="220" r="150" fill="#2563EB" opacity="0.25" filter="url(#bulbAmbientGlow)" />

  <!-- Modern Flat Light Bulb (Learning Center Theme) -->
  <g transform="translate(96, 70) scale(10)" filter="url(#bulbGlow)">
    
    <!-- Radiating Rays of Insight & Innovation (Knowledge Glow) -->
    <g stroke="url(#bulbBlueGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
      <line x1="16" y1="2" x2="16" y2="5" />
      <line x1="5" y1="8" x2="7.5" y2="10.5" />
      <line x1="27" y1="8" x2="24.5" y2="10.5" />
      <line x1="1" y1="18" x2="4" y2="18" />
      <line x1="31" y1="18" x2="28" y2="18" />
    </g>

    <!-- Main Light Bulb Glass Contour (Modern Sleek Profile) -->
    <path d="M16 8 C10.5 8 6 12.5 6 18 C6 21.5 7.8 24.5 10.5 26.5 C11.5 27.2 12 28.2 12 29.5 L12 31.5 C12 32.3 12.7 33 13.5 33 L18.5 33 C19.3 33 20 32.3 20 31.5 L20 29.5 C20 28.2 20.5 27.2 21.5 26.5 C24.2 24.5 26 21.5 26 18 C26 12.5 21.5 8 16 8 Z" 
          fill="none" stroke="url(#bulbBlueGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Internal Stylized Brain / Filament Core (Knowledge / AI Learning Hub) -->
    <g fill="none" stroke="url(#bulbBlueGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- Synaptic Connection Rays / Core Node -->
      <path d="M12 17 C12 15 13.5 13.5 16 13.5 C18.5 13.5 20 15 20 17 C20 19.5 16 20.5 16 23" />
      <circle cx="16" cy="18" r="3.5" fill="url(#bulbHighlight)" stroke="none" />
      <circle cx="16" cy="18" r="1.5" fill="#FFFFFF" stroke="none" />
    </g>

    <!-- Screw Base / Socket Layers -->
    <path d="M12.5 33 L19.5 33" stroke="url(#bulbBlueGrad)" stroke-width="2" stroke-linecap="round" />
    <path d="M13.5 36 L18.5 36" stroke="url(#bulbBlueGrad)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Bottom Contact Point -->
    <path d="M14.5 38.5 C14.5 39.3 15.2 40 16 40 C16.8 40 17.5 39.3 17.5 38.5 Z" fill="url(#bulbBlueGrad)" stroke="none" />

  </g>
</svg>

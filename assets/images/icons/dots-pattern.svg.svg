<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep Enterprise SaaS Background Gradient -->
    <linearGradient id="saasBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Subtle Dotted Grid Pattern Definition -->
    <pattern id="dotPattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#60A5FA" fill-opacity="0.25" />
    </pattern>

    <!-- Glowing Ambient Radial Lighting for Depth -->
    <radialGradient id="saasGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.2" />
      <stop offset="60%" stop-color="#1E3A8A" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Dark Enterprise SaaS Background -->
  <rect width="512" height="512" fill="url(#saasBgGrad)" />

  <!-- Ambient Light Center Spotlight -->
  <circle cx="256" cy="256" r="256" fill="url(#saasGlow)" />

  <!-- Applied Subtle Dotted Pattern Layer -->
  <rect width="512" height="512" fill="url(#dotPattern)" />

  <!-- Clean Border Vignette -->
  <rect width="512" height="512" fill="none" stroke="#000000" stroke-width="16" opacity="0.5" />
</svg>

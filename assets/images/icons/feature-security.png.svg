<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Enterprise AI Security Blue to Cyan Gradient -->
    <linearGradient id="shieldBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Bright Core Highlight Gradient -->
    <linearGradient id="shieldHighlight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Glowing Atmosphere Filter -->
    <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Soft Ambient Backlight Glow -->
    <filter id="shieldAmbient" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Blue Security Aura Behind Shield -->
  <circle cx="256" cy="256" r="160" fill="#2563EB" opacity="0.22" filter="url(#shieldAmbient)" />

  <!-- Premium AI Security Shield Icon -->
  <g transform="translate(96, 64) scale(10)" filter="url(#shieldGlow)">
    
    <!-- Outer Security Shield Contour -->
    <path d="M16 3 C22 3 27 5 29 7 C29 17 26 25 16 31 C6 25 3 17 3 7 C5 5 10 3 16 3 Z" 
          fill="none" stroke="url(#shieldBlueGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Inner Futuristic Shield Accents / Circuit Framing -->
    <path d="M16 6 C20.5 6 24 7.5 25.5 9.5 C25.5 16 23 21.5 16 27 C9 21.5 6.5 16 6.5 9.5 C8 7.5 11.5 6 16 6 Z" 
          fill="rgba(37, 99, 235, 0.1)" stroke="url(#shieldBlueGrad)" stroke-width="1.2" stroke-dasharray="4 2" />

    <!-- Central AI Neural Core / Security Check Symbol -->
    <g transform="translate(16, 16)">
      <!-- AI Nodes Connected inside Shield -->
      <circle cx="0" cy="-2" r="3.5" fill="none" stroke="url(#shieldBlueGrad)" stroke-width="1.8" />
      <circle cx="0" cy="-2" r="1.5" fill="url(#shieldHighlight)" />
      
      <!-- Security Checkmark / Neural Data Pulse -->
      <path d="M-3.5 3 L-1 5.5 L4.5 -1" fill="none" stroke="url(#shieldHighlight)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Floating Cyber / Data Defense Particles -->
    <circle cx="9" cy="8" r="1" fill="#38BDF8" />
    <circle cx="23" cy="8" r="1" fill="#2DD4BF" />
    <circle cx="16" cy="27" r="1" fill="#FFFFFF" />

  </g>
</svg>

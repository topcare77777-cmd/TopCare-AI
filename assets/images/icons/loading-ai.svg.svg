<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Glowing Blue Gradients for Neural Nodes -->
    <linearGradient id="coreGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <linearGradient id="nodePulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Intense Backdrop Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Container Shadow -->
    <filter id="bgShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark Enterprise SaaS Background Badge -->
  <circle cx="256" cy="256" r="230" fill="#0F172A" stroke="rgba(59, 130, 246, 0.2)" stroke-width="4" filter="url(#bgShadow)" />

  <!-- Background Cybernetic Circuit Rings -->
  <g fill="none" stroke="#1E3A8A" stroke-width="1.5" opacity="0.4">
    <circle cx="256" cy="256" r="160" stroke-dasharray="4 8" />
    <circle cx="256" cy="256" r="120" />
    <circle cx="256" cy="256" r="80" stroke-dasharray="2 6" />
  </g>

  <!-- Central Pulsing AI Core Network -->
  <g transform="translate(256, 256)" filter="url(#neonGlow)">
    <!-- Rotating Outer Orbit Group -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
      
      <!-- Connecting Synaptic Paths -->
      <path d="M 0 -110 L 0 -55 M 0 110 L 0 55 M -110 0 L -55 0 M 110 0 L 55 0 M -78 -78 L -39 -39 M 78 78 L 39 39 M -78 78 L -39 39 M 78 -78 L 39 -39" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />

      <!-- Orbiting Neural Nodes (Ring of 8) -->
      <g fill="url(#nodePulse)">
        <circle cx="0" cy="-110" r="8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0s"/></circle>
        <circle cx="78" cy="-78" r="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.2s"/></circle>
        <circle cx="110" cy="0" r="9"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.4s"/></circle>
        <circle cx="78" cy="78" r="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.6s"/></circle>
        <circle cx="0" cy="110" r="8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.8s"/></circle>
        <circle cx="-78" cy="78" r="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1.0s"/></circle>
        <circle cx="-110" cy="0" r="9"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1.2s"/></circle>
        <circle cx="-78" cy="-78" r="6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1.4s"/></circle>
      </g>
    </g>

    <!-- Counter-Rotating Middle Data Ring -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="72" fill="none" stroke="#60A5FA" stroke-width="3" stroke-dasharray="12 24" opacity="0.8">
        <animate attributeName="stroke-dashoffset" values="0;72" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Central AI Brain / Core Nucleus -->
    <circle cx="0" cy="0" r="32" fill="url(#coreGlow)">
      <animate attributeName="r" values="28;34;28" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Inner Core Energy Pulse -->
    <circle cx="0" cy="0" r="14" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Loading Status Text Badge Footer -->
  <g transform="translate(256, 420)">
    <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" opacity="0.9" />
    <text x="0" y="5" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1.5" text-anchor="middle">LOADING AI</text>
  </g>
</svg>

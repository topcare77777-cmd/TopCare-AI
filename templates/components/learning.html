<section class="learning section">
    <div class="container">
        <div class="learning-heading">
            <div>
                <p class="learning-kicker">TopCare Learning Path</p>
                <h2 class="heading">{{title}}</h2>
                <p class="subtitle">{{subtitle}}</p>
            </div>
            <div class="learning-stat"><strong>{{courseCount}}</strong><span>jalur belajar</span></div>
        </div>
        <div class="learning-tools">
            <div class="learning-filters" aria-label="Filter level kursus">
                <button type="button" class="learning-filter active" data-filter="All">Semua</button>
                <button type="button" class="learning-filter" data-filter="Beginner">Pemula</button>
                <button type="button" class="learning-filter" data-filter="Intermediate">Menengah</button>
                <button type="button" class="learning-filter" data-filter="Advanced">Lanjutan</button>
            </div>
            <label class="learning-search"><span class="sr-only">Cari kursus</span><input type="search" placeholder="{{searchPlaceholder}}" aria-label="Cari kursus"></label>
        </div>
        <div class="learning-grid">{{courses}}</div>
        <p class="learning-empty" hidden>Tidak ada kursus yang sesuai dengan pencarian Anda.</p>
    </div>
    <dialog class="learning-dialog" aria-labelledby="course-dialog-title"></dialog>
</section>

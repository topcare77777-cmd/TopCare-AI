<section class="assistant section">
    <div class="container">
        <div class="assistant-wrapper">
            <div class="assistant-info" data-animate="animate-left">
                <p class="assistant-kicker">{{eyebrow}}</p>
                <h2 class="heading">{{title}}</h2>
                <p class="subtitle">{{subtitle}}</p>
                <p class="assistant-note">{{note}}</p>
                <div class="assistant-suggestion" aria-label="Saran pertanyaan">{{suggestions}}</div>
            </div>
            <div class="assistant-chat card" data-animate="animate-right">
                <div class="chat-header">
                    <div>
                        <strong>🤖 TopCare AI</strong>
                        <span class="chat-status"><i></i>{{status}}</span>
                    </div>
                    <button type="button" class="chat-clear" aria-label="Hapus percakapan">Hapus</button>
                </div>
                <div class="chat-body" aria-live="polite" aria-label="Percakapan dengan TopCare AI"></div>
                <form class="chat-input">
                    <label class="sr-only" for="assistant-message">Pertanyaan untuk TopCare AI</label>
                    <input id="assistant-message" type="text" maxlength="500" autocomplete="off" placeholder="{{placeholder}}">
                    <button type="submit" class="btn btn-primary">{{button}}</button>
                </form>
            </div>
        </div>
    </div>
</section>

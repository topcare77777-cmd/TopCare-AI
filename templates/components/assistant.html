<section class="assistant section">

<div class="container">

<div class="assistant-wrapper">

<div
class="assistant-info"
data-animate="animate-left">

<h2 class="heading">

{{title}}

</h2>

<p class="subtitle">

{{subtitle}}

</p>

<div class="assistant-suggestion">

{{suggestions}}

</div>

</div>

<div
class="assistant-chat card"
data-animate="animate-right">

<div class="chat-header">

🤖 TopCare AI

</div>

<div class="chat-body">

<div class="chat-message">

Halo 👋

Ada yang ingin Anda pelajari hari ini?

</div>

</div>

<div class="chat-input">

<input

type="text"

placeholder="{{placeholder}}">

<button class="btn btn-primary">

{{button}}

</button>

</div>

</div>

</div>

</div>

</section>
